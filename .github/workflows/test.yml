name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  deployment_status:

env:
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"

permissions:
  contents: read
  deployments: read

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    if: github.event_name != 'deployment_status'

    # unit tests don't need environment variables - they test pure functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test:unit

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: unit # run after unit tests pass
    if: github.event_name != 'deployment_status'

    # these are placeholders which is fine for integration tests
    env:
      KV_URL: redis://localhost:6379
      KV_REST_API_READ_ONLY_TOKEN: test-read-only-token
      KV_REST_API_TOKEN: test-api-token
      KV_REST_API_URL: https://test-kv-api.example.com
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      BILLING_API_URL: https://billing.e2b-test.dev
      NEXT_PUBLIC_E2B_DOMAIN: e2b-test.dev
      NEXT_PUBLIC_POSTHOG_KEY: test-posthog-key
      NEXT_PUBLIC_SUPABASE_URL: https://test-supabase-url.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-supabase-anon-key
      NEXT_PUBLIC_STRIPE_BILLING_URL: https://test-stripe-billing.example.com
      NEXT_PUBLIC_SCAN: 0
      NEXT_PUBLIC_MOCK_DATA: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun test:integration

  preview:
    name: Preview
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment != 'Production' &&
      github.event.deployment.environment != 'production'
    concurrency:
      group: preview-e2e-${{ github.event.deployment.ref || github.event.deployment.sha || github.run_id }}
      cancel-in-progress: true
    env:
      PLAYWRIGHT_MODE: pr
      PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Ensure preview URL is available
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL is missing from deployment_status payload"
            exit 1
          fi

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run e2e:install-browsers

      - name: Run Playwright E2E
        run: bun run e2e:test:pr

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
