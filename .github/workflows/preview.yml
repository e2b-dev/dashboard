name: Preview

on:
  deployment_status:

env:
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"

permissions:
  contents: read
  deployments: read

jobs:
  preview-tests:
    name: Preview Tests
    runs-on: ubuntu-latest
    if: >
      github.event.deployment_status.state == 'success' &&
      (
        contains(github.event.deployment.environment, 'Preview') ||
        contains(github.event.deployment.environment, 'preview')
      )
    concurrency:
      group: preview-e2e-${{ github.event.deployment.environment || 'unknown' }}
      cancel-in-progress: true
    env:
      PLAYWRIGHT_MODE: pr
      PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Ensure preview URL is available
        run: |
          if [ -z "$PLAYWRIGHT_BASE_URL" ]; then
            echo "PLAYWRIGHT_BASE_URL is missing from deployment_status payload"
            exit 1
          fi

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run e2e:install-browsers

      - name: Run Playwright E2E
        run: bun run e2e:test:pr

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
